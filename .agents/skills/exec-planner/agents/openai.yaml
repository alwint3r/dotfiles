interface:
  display_name: "Exec Planner"
  short_description: "Create robust, executable implementation plans"
  default_prompt: "Use $exec-planner to generate a self-contained ExecPlan. Start with minimal reconnaissance of the current working directory only: inspect the top-level repo state, identify likely files or modules, and capture constraints and unknowns. Draft the initial ExecPlan immediately instead of doing exhaustive research first. If write permission is not yet available, emit the full ExecPlan inline with clearly marked TBD items and stop before implementation. If write permission is available, write the initial ExecPlan under .agent/execplans/ in the project working directory before any implementation edits, then continue implementation and keep the same plan updated as a living document. Before loading PLANS guidance, normalize paths by stripping one leading '@', never pass literal @ paths to file tools, then try .agents/skills/exec-planner/references/PLANS.md, ${HOME}/.agents/skills/exec-planner/references/PLANS.md, references/PLANS.md, and <skill_root>/references/PLANS.md in order (derive <skill_root> as the directory that contains the loaded SKILL.md file). If all reads fail, continue using the embedded PLANS core without failing the task."
